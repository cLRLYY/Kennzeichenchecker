name: Kennzeichenchecker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

permissions:
  contents: write

jobs:
  run-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_ACTIONS: "true"

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright Browser installieren
        run: python -m playwright install --with-deps chromium

      - name: state.json anlegen falls nicht vorhanden
        run: |
          if [ ! -f state.json ]; then
            echo "{}" > state.json
          fi

      - name: Script ausführen
        run: python main.py

      - name: state.json und logs.txt committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json logs.txt

          if git diff --cached --quiet; then
            echo "Keine Änderungen zu committen."
          else
            git commit -m "Update state.json and logs"
            git push
          fi
